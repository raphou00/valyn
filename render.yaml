# Render Blueprint — defines the web service. Env vars are populated by
# Pulumi (aws/render/env-sync.ts) on every `pulumi up`, hence sync: false
# below: Render won't overwrite values managed externally.
#
# Manual values (set once in the Render dashboard, OR add them to Pulumi
# config to be synced too): SHOPIFY_API_KEY, SHOPIFY_API_SECRET,
# SHOPIFY_SCOPES, SMTP_CREDS_KEY, DATABASE_URL.

services:
    - type: web
      name: valyn
      runtime: docker
      plan: starter
      region: oregon
      branch: main
      autoDeploy: true
      dockerfilePath: ./Dockerfile
      healthCheckPath: /api/health
      envVars:
          - key: NODE_ENV
            value: production
          - key: APP_URL
            sync: false
          - key: SHOPIFY_APP_URL
            sync: false
          - key: SHOPIFY_API_KEY
            sync: false
          - key: SHOPIFY_API_SECRET
            sync: false
          - key: SHOPIFY_SCOPES
            sync: false
          - key: DATABASE_URL
            sync: false
          - key: SMTP_CREDS_KEY
            sync: false
          # Synced from Pulumi:
          - key: AWS_REGION
            sync: false
          - key: AWS_ACCESS_KEY_ID
            sync: false
          - key: AWS_SECRET_ACCESS_KEY
            sync: false
          - key: RATE_LIMITS_TABLE_NAME
            sync: false
          - key: INBOUND_EMAIL_BUCKET
            sync: false
          - key: INBOUND_EMAIL_DOMAIN
            sync: false
          - key: INBOUND_SNS_TOPIC_ARN
            sync: false
